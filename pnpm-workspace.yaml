packages:
  - apps/*
  - tools/*

catalog:
  '@heroui/react': ^3.0.1
  '@heroui/styles': ^3.0.1
  '@tailwindcss/vite': ^4.2.2
  '@types/node': ^24
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/plugin-react': ^6.0.1
  iii-browser-sdk: 0.10.0-beta.1
  iii-sdk: 0.11.0-next.5
  react: ^19.2.4
  react-dom: ^19.2.4
  tailwindcss: ^4.2.2
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
